<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Currency Converter</h1>
    <p>Real-time exchange rates</p>
  </div>
  <div class="body">
    <div class="field">
      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="Enter amount" min="0" step="any" value="1">
    </div>

    <div class="currency-row">
      <div class="field">
        <label for="fromCurrency">From</label>
        <select id="fromCurrency"></select>
      </div>
      <button class="swap-btn" id="swapBtn" title="Swap currencies" type="button">
        <svg viewBox="0 0 24 24"><path d="M7.5 3.5L3.5 7.5l4 4M3.5 7.5h13m0 9l4-4-4-4m4 4h-13" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="field">
        <label for="toCurrency">To</label>
        <select id="toCurrency"></select>
      </div>
    </div>

    <button class="convert-btn" id="convertBtn" type="button">Convert</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">Fetching exchange rates...</p>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-amount" id="resultAmount"></div>
      <div class="result-rate" id="resultRate"></div>
      <div class="result-time" id="resultTime"></div>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
