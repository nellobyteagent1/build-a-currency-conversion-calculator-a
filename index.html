<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#1a73e8;--primary-dark:#1557b0;--bg:#f0f4f8;--card:#fff;--text:#1f2937;--text-light:#6b7280;--border:#e5e7eb;--error:#dc2626;--success:#059669;--shadow:0 4px 24px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:440px;overflow:hidden}
.header{background:linear-gradient(135deg,var(--primary),#4285f4);padding:28px 24px 22px;text-align:center;color:#fff}
.header h1{font-size:1.35rem;font-weight:700;letter-spacing:.3px}
.header p{font-size:.82rem;opacity:.85;margin-top:4px}
.body{padding:24px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:1rem;color:var(--text);background:#fff;transition:border-color .2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.field input::placeholder{color:#adb5bd}
.currency-row{display:flex;gap:10px;align-items:flex-end}
.currency-row .field{flex:1;margin-bottom:0}
.swap-btn{flex-shrink:0;width:42px;height:42px;border:1.5px solid var(--border);border-radius:50%;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-bottom:0;align-self:flex-end}
.swap-btn:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.swap-btn svg{width:20px;height:20px;fill:currentColor;transition:transform .3s}
.swap-btn:hover svg{fill:#fff}
.swap-btn:active svg{transform:rotate(180deg)}
.convert-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:20px}
.convert-btn:hover{background:var(--primary-dark)}
.convert-btn:disabled{background:#93c5fd;cursor:not-allowed}
.result-box{margin-top:20px;padding:18px;background:#f0f7ff;border-radius:10px;text-align:center;display:none}
.result-box.show{display:block;animation:fadeIn .3s ease}
.result-amount{font-size:1.7rem;font-weight:700;color:var(--primary)}
.result-rate{font-size:.82rem;color:var(--text-light);margin-top:6px}
.result-time{font-size:.72rem;color:#9ca3af;margin-top:4px}
.error-box{margin-top:14px;padding:12px 16px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:var(--error);font-size:.85rem;display:none;text-align:center}
.error-box.show{display:block;animation:fadeIn .3s ease}
.loading{display:none;text-align:center;margin-top:16px}
.loading.show{display:block}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.loading-text{font-size:.8rem;color:var(--text-light);margin-top:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  .card{border-radius:12px}
  .header{padding:22px 18px 18px}
  .body{padding:18px}
  .result-amount{font-size:1.4rem}
}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Currency Converter</h1>
    <p>Real-time exchange rates</p>
  </div>
  <div class="body">
    <div class="field">
      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="Enter amount" min="0" step="any" value="1">
    </div>

    <div class="currency-row">
      <div class="field">
        <label for="fromCurrency">From</label>
        <select id="fromCurrency"></select>
      </div>
      <button class="swap-btn" id="swapBtn" title="Swap currencies" type="button">
        <svg viewBox="0 0 24 24"><path d="M7.5 3.5L3.5 7.5l4 4M3.5 7.5h13m0 9l4-4-4-4m4 4h-13" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="field">
        <label for="toCurrency">To</label>
        <select id="toCurrency"></select>
      </div>
    </div>

    <button class="convert-btn" id="convertBtn" type="button">Convert</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">Fetching exchange rates...</p>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-amount" id="resultAmount"></div>
      <div class="result-rate" id="resultRate"></div>
      <div class="result-time" id="resultTime"></div>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>
</div>

<script>
const CURRENCIES = [
  { code: 'USD', name: 'US Dollar', flag: '\u{1F1FA}\u{1F1F8}' },
  { code: 'EUR', name: 'Euro', flag: '\u{1F1EA}\u{1F1FA}' },
  { code: 'GBP', name: 'British Pound', flag: '\u{1F1EC}\u{1F1E7}' },
  { code: 'JPY', name: 'Japanese Yen', flag: '\u{1F1EF}\u{1F1F5}' },
  { code: 'CNY', name: 'Chinese Yuan', flag: '\u{1F1E8}\u{1F1F3}' },
  { code: 'INR', name: 'Indian Rupee', flag: '\u{1F1EE}\u{1F1F3}' },
  { code: 'AUD', name: 'Australian Dollar', flag: '\u{1F1E6}\u{1F1FA}' },
  { code: 'CAD', name: 'Canadian Dollar', flag: '\u{1F1E8}\u{1F1E6}' },
  { code: 'CHF', name: 'Swiss Franc', flag: '\u{1F1E8}\u{1F1ED}' },
  { code: 'NZD', name: 'New Zealand Dollar', flag: '\u{1F1F3}\u{1F1FF}' },
  { code: 'SGD', name: 'Singapore Dollar', flag: '\u{1F1F8}\u{1F1EC}' },
  { code: 'HKD', name: 'Hong Kong Dollar', flag: '\u{1F1ED}\u{1F1F0}' },
  { code: 'KRW', name: 'South Korean Won', flag: '\u{1F1F0}\u{1F1F7}' },
  { code: 'MXN', name: 'Mexican Peso', flag: '\u{1F1F2}\u{1F1FD}' },
  { code: 'BRL', name: 'Brazilian Real', flag: '\u{1F1E7}\u{1F1F7}' },
  { code: 'ZAR', name: 'South African Rand', flag: '\u{1F1FF}\u{1F1E6}' },
  { code: 'SEK', name: 'Swedish Krona', flag: '\u{1F1F8}\u{1F1EA}' },
  { code: 'NOK', name: 'Norwegian Krone', flag: '\u{1F1F3}\u{1F1F4}' },
  { code: 'DKK', name: 'Danish Krone', flag: '\u{1F1E9}\u{1F1F0}' },
  { code: 'PLN', name: 'Polish Zloty', flag: '\u{1F1F5}\u{1F1F1}' },
  { code: 'THB', name: 'Thai Baht', flag: '\u{1F1F9}\u{1F1ED}' },
  { code: 'IDR', name: 'Indonesian Rupiah', flag: '\u{1F1EE}\u{1F1E9}' },
  { code: 'MYR', name: 'Malaysian Ringgit', flag: '\u{1F1F2}\u{1F1FE}' },
  { code: 'PHP', name: 'Philippine Peso', flag: '\u{1F1F5}\u{1F1ED}' },
  { code: 'TWD', name: 'Taiwan Dollar', flag: '\u{1F1F9}\u{1F1FC}' },
  { code: 'AED', name: 'UAE Dirham', flag: '\u{1F1E6}\u{1F1EA}' },
  { code: 'SAR', name: 'Saudi Riyal', flag: '\u{1F1F8}\u{1F1E6}' },
  { code: 'NGN', name: 'Nigerian Naira', flag: '\u{1F1F3}\u{1F1EC}' },
  { code: 'KES', name: 'Kenyan Shilling', flag: '\u{1F1F0}\u{1F1EA}' },
  { code: 'GHS', name: 'Ghanaian Cedi', flag: '\u{1F1EC}\u{1F1ED}' }
];

const API_BASE = 'https://open.er-api.com/v6/latest';
const CACHE_DURATION = 30 * 60 * 1000; // 30 minutes
const rateCache = {};

const $ = id => document.getElementById(id);
const fromSelect = $('fromCurrency');
const toSelect = $('toCurrency');
const amountInput = $('amount');
const convertBtn = $('convertBtn');
const swapBtn = $('swapBtn');
const loading = $('loading');
const resultBox = $('resultBox');
const resultAmount = $('resultAmount');
const resultRate = $('resultRate');
const resultTime = $('resultTime');
const errorBox = $('errorBox');

function populateSelects() {
  CURRENCIES.forEach(c => {
    const opt1 = new Option(`${c.flag} ${c.code} - ${c.name}`, c.code);
    const opt2 = new Option(`${c.flag} ${c.code} - ${c.name}`, c.code);
    fromSelect.add(opt1);
    toSelect.add(opt2);
  });
  fromSelect.value = 'USD';
  toSelect.value = 'EUR';
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('show');
  resultBox.classList.remove('show');
}

function hideError() {
  errorBox.classList.remove('show');
}

function showLoading(show) {
  loading.classList.toggle('show', show);
  convertBtn.disabled = show;
}

function formatNumber(num, code) {
  const decimals = ['JPY', 'KRW', 'IDR', 'VND'].includes(code) ? 0 : 2;
  return new Intl.NumberFormat('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  }).format(num);
}

async function fetchRates(base) {
  const cached = rateCache[base];
  if (cached && Date.now() - cached.timestamp < CACHE_DURATION) {
    return cached.rates;
  }
  const res = await fetch(`${API_BASE}/${base}`);
  if (!res.ok) throw new Error(`API returned ${res.status}`);
  const data = await res.json();
  if (data.result !== 'success') throw new Error(data['error-type'] || 'Unknown API error');
  rateCache[base] = { rates: data.rates, timestamp: Date.now() };
  return data.rates;
}

async function convert() {
  hideError();
  const amount = parseFloat(amountInput.value);
  if (isNaN(amount) || amount < 0) {
    showError('Please enter a valid positive number.');
    return;
  }
  const from = fromSelect.value;
  const to = toSelect.value;

  showLoading(true);
  resultBox.classList.remove('show');

  try {
    const rates = await fetchRates(from);
    const rate = rates[to];
    if (!rate) throw new Error(`Rate for ${to} not available.`);
    const converted = amount * rate;

    resultAmount.textContent = `${formatNumber(amount, from)} ${from} = ${formatNumber(converted, to)} ${to}`;
    resultRate.textContent = `1 ${from} = ${formatNumber(rate, to)} ${to}`;
    resultTime.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    resultBox.classList.add('show');
  } catch (err) {
    showError(err.message === 'Failed to fetch'
      ? 'Could not reach exchange rate service. Check your internet connection.'
      : `Error: ${err.message}`);
  } finally {
    showLoading(false);
  }
}

swapBtn.addEventListener('click', () => {
  const tmp = fromSelect.value;
  fromSelect.value = toSelect.value;
  toSelect.value = tmp;
  if (resultBox.classList.contains('show')) convert();
});

convertBtn.addEventListener('click', convert);
amountInput.addEventListener('keydown', e => { if (e.key === 'Enter') convert(); });

populateSelects();
convert(); // auto-convert on load
</script>
</body>
</html>
